graph:
  id: gagasan_agung_ollama
  description: |
    Multi-agent research ideation lab (12 ideas -> attack -> refine Top-5 -> rank), with optional web browsing and an optional repeat loop. Optimized for local Ollama models with multi-model support.
  log_level: INFO
  is_majority_voting: false
  nodes:
    - id: LoopCounter
      type: loop_counter
      description: Limits the ideation repeat loop to a maximum of 3 iterations.
      context_window: 0
      config:
        max_iterations: 3
        reset_on_emit: true
        message: Maximum iteration limit reached. Proceeding to final output.
    - id: FINAL
      type: passthrough
      description: Terminal passthrough node.
      context_window: 0
      config: {}
    - id: Coordinator
      type: agent
      description: Orchestrator that normalizes user input and produces an execution plan.
      context_window: 6
      config:
        name: ${EDITOR_MODEL}
        provider: openai
        base_url: ${OLLAMA_BASE_URL}
        api_key: ${API_KEY}
        params: {}
        role: |-
          You are the Orchestrator/Editor. Enforce STRICT output format and quality gates:
          - No fluff.
          - Every idea MUST include: (1) hard-to-fake experiment, (2) critical ablation,
            (3) falsification criteria.
          - Keep scope controlled and feasible on local compute.
          You will also normalize the user input into a single "Seed Summary" object.

          INPUT MODES:
          Mode A (topic-only): FIELD/DOMAIN, TOPIC SEED, CONSTRAINTS.
          Mode B (PDF-seeded): title/authors/venue/year + abstract + method + results + limitations + notes.

          OUTPUT (STRICT):
          1) Seed Summary (Mode, Field, Topic, Constraints, any PDF fields)
          2) Execution Plan: list phases Round1..Round4 with what each agent will output

          IMPORTANT: Your Seed Summary is the anchor for the ENTIRE pipeline. Be thorough and specific.
          Include ALL key technical details from the input (specific model names, architectures, datasets,
          metrics, and domain-specific terminology). Downstream agents will rely on this summary to stay on-topic.
        tooling: []
        thinking: null
        memories: []
        retry: null
    - id: ProblemScoper
      type: agent
      description: Produces 3-5 precise, falsifiable problem statements from the Seed Summary.
      context_window: 8
      config:
        name: ${BRAIN_MODEL}
        provider: openai
        base_url: ${OLLAMA_BASE_URL}
        api_key: ${API_KEY}
        params: {}
        role: |-
          Problem-Scoper.
          From the Seed Summary, produce 3-5 precise problem statements.
          For each: assumptions, success criteria, and scope boundaries.
          Keep them falsifiable and experimentally grounded.
          Output as bullets with unique IDs (P1..P5).

          GROUNDING RULE: Every problem statement MUST directly relate to the specific methods or
          limitations described in the Seed Summary. Do NOT drift into generic or tangentially related
          problems. If the Seed Summary describes a specific system, your problems must be about
          THAT system or its direct extensions.
        tooling: []
        thinking: null
        memories: []
        retry: null
    - id: GapMiner
      type: agent
      description: Extracts unresolved limitations, missing ablations, and untested regimes.
      context_window: 8
      config:
        name: ${BRAIN_MODEL}
        provider: openai
        base_url: ${OLLAMA_BASE_URL}
        api_key: ${API_KEY}
        params: {}
        role: |-
          Gap Miner (PDF-aware if Mode B).
          Extract:
          - unresolved limitations
          - missing ablations
          - questionable assumptions
          - untested regimes
          Map each gap -> hypothesis (G1..Gn), each with a direct falsification test.

          GROUNDING RULE: Every gap and hypothesis MUST be traceable to a specific claim, method,
          or result in the Seed Summary. Reference the exact component or finding you are targeting.
          Do NOT introduce gaps from unrelated domains.
        tooling: []
        thinking: null
        memories: []
        retry: null
    - id: WebResearcher
      type: agent
      description: Optional prior-art web search agent. Controlled by ENABLE_BROWSING var.
      context_window: 8
      config:
        name: ${EDITOR_MODEL}
        provider: openai
        base_url: ${OLLAMA_BASE_URL}
        api_key: ${API_KEY}
        params: {}
        role: |-
          Optional Web Researcher.
          ENABLE_BROWSING is "${ENABLE_BROWSING}".

          If ENABLE_BROWSING is not "true":
            - Do NOT browse. Output: "Browsing disabled; skipping prior-art check."
          If ENABLE_BROWSING is "true":
            - Use web_search to check: (1) closest prior art for top gaps, (2) standard baselines/metrics.
            - Use read_webpage_content to fetch full text of promising results.
            - Return bullet citations (title/venue/year + why relevant).
            - Flag "already-known" risks and suggest novelty pivots.

          CRITICAL — Empty results handling:
            - If a web_search call returns empty content or no results, explicitly state: "No results found for query: [query]."
            - Do NOT fabricate, hallucinate, or invent citations. Every citation you output MUST come from an actual search result with a verifiable URL you received.
            - If all searches return empty, output: "Web search returned no relevant results. Proceeding without prior-art citations."
            - It is far better to report zero citations than to fabricate even one.

          GROUNDING RULE: Search queries MUST use specific technical terms from the Seed Summary,
          not generic terms. For example, if the topic is about VLA-based mobile manipulation,
          search for those exact terms and their components.
        tooling:
          - type: function
            config:
              tools:
                - name: web:All
              timeout: null
        thinking: null
        memories: []
        retry: null
    - id: MethodsDesigner_R1
      type: agent
      description: Generates exactly 12 raw research ideas with structured experimental plans.
      context_window: 12
      config:
        name: ${BRAIN_MODEL}
        provider: openai
        base_url: ${OLLAMA_BASE_URL}
        api_key: ${API_KEY}
        params: {}
        role: |-
          Methods Designer — Round 1 (Divergent).
          Generate EXACTLY 12 raw ideas. Each idea MUST include:
          - problem_statement (precise)
          - hypothesis (testable)
          - falsification_criteria (what result disproves it)
          - method_sketch (algorithm/pipeline)
          - hard_to_fake_experiment (hidden split/trap regime/preregistered prediction/etc.)
          - critical_ablation (confound-killing)
          - week-1 minimal viable experiment (MVE)
          - month-1 scale-up plan
          - baselines (>=2)
          - ablations (>=2)
          - metrics + sanity checks

          Output format:
          Round 1 (Divergent): 12 raw ideas
          I01..I12 with dense structured bullets.

          GROUNDING RULE: Every idea MUST directly extend, challenge, improve, or build upon
          the specific contributions, methods, or limitations described in the Seed Summary.
          Begin each idea's problem_statement by referencing which aspect of the Seed Summary
          it addresses. Discard any idea that could apply to an arbitrary unrelated paper.
        tooling: []
        thinking: null
        memories: []
        retry: null
    - id: RedTeamCritic_R2
      type: agent
      description: Attacks all 12 ideas for novelty, feasibility, and confound issues.
      context_window: 14
      config:
        name: ${BRAIN_MODEL}
        provider: openai
        base_url: ${OLLAMA_BASE_URL}
        api_key: ${API_KEY}
        params: {}
        role: |-
          Novelty/Red-Team Critic — Round 2 (Attack).
          Attack ALL 12 ideas: why incremental/already-known/confounded/likely to fail.
          For each Ixx output:
          - Verdict: KEEP / FIX / KILL
          - The single most fatal flaw
          - A stronger variant OR kill-criterion
          Be ruthless.

          RELEVANCE CHECK: The Seed Summary (marked as a kept message in your context) describes
          the original input topic. Also flag any idea that does NOT directly address this topic.
          An idea that is generically interesting but irrelevant to the input paper/topic should
          receive a KILL verdict with reason "off-topic."
        tooling: []
        thinking: null
        memories: []
        retry: null
    - id: FeasibilityEngineer_R2
      type: agent
      description: Estimates data/compute/engineering needs and flags impractical ideas.
      context_window: 14
      config:
        name: ${BRAIN_MODEL}
        provider: openai
        base_url: ${OLLAMA_BASE_URL}
        api_key: ${API_KEY}
        params: {}
        role: |-
          Feasibility Engineer — Round 2 (Feasibility flags).
          For ALL 12 ideas, estimate:
          - data needs
          - compute/memory
          - engineering effort
          - failure modes
          Mark: PRACTICAL / BORDERLINE / IMPRACTICAL
          Provide a cheaper salvage variant for BORDERLINE/IMPRACTICAL.

          GROUNDING RULE: Evaluate feasibility in the context of the specific domain and
          infrastructure described in the Seed Summary. Consider the actual hardware, simulators,
          and compute resources relevant to that domain.
        tooling: []
        thinking: null
        memories: []
        retry: null
    - id: EvaluationArchitect_R2
      type: agent
      description: Audits all 12 ideas for missing baselines, ablations, and statistical rigor.
      context_window: 14
      config:
        name: ${BRAIN_MODEL}
        provider: openai
        base_url: ${OLLAMA_BASE_URL}
        api_key: ${API_KEY}
        params: {}
        role: |-
          Evaluation Architect — Round 2 (Audit).
          For ALL 12 ideas, check missing:
          - baselines
          - ablations
          - statistical test
          - sanity check
          - falsification criterion
          Propose the minimum fixes required to make it publishable-grade.

          GROUNDING RULE: Baselines and evaluation metrics should be appropriate for the specific
          domain described in the Seed Summary. Reference standard benchmarks and metrics from
          that field, not generic ones.
        tooling: []
        thinking: null
        memories: []
        retry: null
    - id: Coordinator_R3R4
      type: agent
      description: Converges surviving ideas into Top-5, ranks them, and decides REPEAT or DONE.
      context_window: 18
      config:
        name: ${EDITOR_MODEL}
        provider: openai
        base_url: ${OLLAMA_BASE_URL}
        api_key: ${API_KEY}
        params: {}
        role: |-
          Coordinator — Round 3 (Convergent) + Round 4 (Rank).
          Using Round 2 attacks + feasibility + eval audits:
          1) Select and refine surviving ideas into EXACTLY 5 strong candidates.
          2) Produce the strict "Ranked Top-5 (table)".
          3) For each Top-5: 1-2 pages dense technical detail with:
             - problem statement (precise)
             - hypothesis + falsification criteria
             - method sketch
             - week-1 MVE + month-1 scale-up
             - baselines + ablations + metrics + sanity checks
             - data requirements and how to obtain/simulate
             - risks + mitigations
             - publishable takeaway if negative
          4) Score each with rubric (0-5 each): Novelty, Feasibility, Testability, Impact, Clarity.
          5) Provide one recommended direction + concrete next-action checklist.

          RELEVANCE GATE: Before selecting the Top-5, verify each candidate against the Seed Summary
          (which appears as a kept message in your context). Discard any idea that is not directly
          relevant to the original input topic, regardless of how well it scores on other criteria.

          End your message with a routing keyword on its own line:
          - If you think another iteration would materially improve results: "REPEAT"
          - Otherwise: "DONE"
        tooling: []
        thinking: null
        memories: []
        retry: null
    - id: FinalWriter
      type: agent
      description: Produces the final polished artifact with ranked ideas and next actions.
      context_window: 16
      config:
        name: ${EDITOR_MODEL}
        provider: openai
        base_url: ${OLLAMA_BASE_URL}
        api_key: ${API_KEY}
        params: {}
        role: |-
          Final Writer.
          Output ONLY the final artifact (no meta commentary), STRICT format:
          - Ranked Top-5 table
          - Top-5 detailed writeups
          - One recommended direction + next-action checklist

          Every idea in the final output must clearly state how it relates to the original
          input topic from the Seed Summary. The Seed Summary appears as a kept message in
          your context — reference it to verify relevance.
        tooling: []
        thinking: null
        memories: []
        retry: null
  edges:
    - from: Coordinator
      to: ProblemScoper
      trigger: true
      carry_data: true
      keep_message: true
      condition: 'true'
    - from: Coordinator
      to: GapMiner
      trigger: false
      carry_data: true
      keep_message: true
      condition: 'true'
    - from: Coordinator
      to: WebResearcher
      trigger: false
      carry_data: true
      keep_message: true
      condition: 'true'
    - from: Coordinator
      to: MethodsDesigner_R1
      trigger: false
      carry_data: true
      keep_message: true
      condition: 'true'
    - from: Coordinator
      to: RedTeamCritic_R2
      trigger: false
      carry_data: true
      keep_message: true
      condition: 'true'
    - from: Coordinator
      to: FeasibilityEngineer_R2
      trigger: false
      carry_data: true
      keep_message: true
      condition: 'true'
    - from: Coordinator
      to: EvaluationArchitect_R2
      trigger: false
      carry_data: true
      keep_message: true
      condition: 'true'
    - from: Coordinator
      to: Coordinator_R3R4
      trigger: false
      carry_data: true
      keep_message: true
      condition: 'true'
    - from: Coordinator
      to: FinalWriter
      trigger: false
      carry_data: true
      keep_message: true
      condition: 'true'
    - from: ProblemScoper
      to: GapMiner
      trigger: true
      carry_data: true
      condition: 'true'
    - from: GapMiner
      to: WebResearcher
      trigger: true
      carry_data: true
      condition: 'true'
    - from: WebResearcher
      to: MethodsDesigner_R1
      trigger: true
      carry_data: true
      keep_message: true
      condition: 'true'
    - from: MethodsDesigner_R1
      to: RedTeamCritic_R2
      trigger: true
      carry_data: true
      keep_message: true
      condition: 'true'
    - from: MethodsDesigner_R1
      to: FeasibilityEngineer_R2
      trigger: false
      carry_data: true
      keep_message: true
      condition: 'true'
    - from: MethodsDesigner_R1
      to: EvaluationArchitect_R2
      trigger: false
      carry_data: true
      keep_message: true
      condition: 'true'
    - from: MethodsDesigner_R1
      to: Coordinator_R3R4
      trigger: false
      carry_data: true
      keep_message: true
      condition: 'true'
    - from: RedTeamCritic_R2
      to: FeasibilityEngineer_R2
      trigger: true
      carry_data: true
      condition: 'true'
    - from: FeasibilityEngineer_R2
      to: EvaluationArchitect_R2
      trigger: true
      carry_data: true
      condition: 'true'
    - from: EvaluationArchitect_R2
      to: Coordinator_R3R4
      trigger: true
      carry_data: true
      condition: 'true'
    - from: Coordinator_R3R4
      to: LoopCounter
      trigger: true
      carry_data: true
      condition:
        type: keyword
        config:
          any:
            - REPEAT
          none: []
          regex: []
          case_sensitive: true
    - from: LoopCounter
      to: MethodsDesigner_R1
      trigger: true
      carry_data: true
      condition: 'true'
    - from: LoopCounter
      to: FinalWriter
      trigger: true
      carry_data: true
      condition:
        type: keyword
        config:
          any:
            - Maximum iteration limit reached
          none: []
          regex: []
          case_sensitive: false
    - from: Coordinator_R3R4
      to: FinalWriter
      trigger: true
      carry_data: true
      condition:
        type: keyword
        config:
          any:
            - DONE
          none:
            - REPEAT
          regex: []
          case_sensitive: true
    - from: FinalWriter
      to: FINAL
      trigger: true
      carry_data: true
      condition: 'true'
  initial_instruction: |-
    Provide input in ONE of the following formats.

    Mode A — Topic-only:
    Field/domain: {FIELD}
    Topic seed: {TOPIC}
    Constraints: {data access, compute, hardware, timeline, tools, target venue}

    Mode B — PDF-seeded (paste text):
    (1) title/authors/venue/year
    (2) abstract
    (3) key method details
    (4) main results tables/figures as text
    (5) limitations + future work
    Optional: reproduction notes and what you can reproduce.

    Also specify if you want internet browsing:
    ENABLE_BROWSING=true/false
  start:
    - Coordinator
  end:
    - FINAL
version: 0.0.0
vars:
  OLLAMA_BASE_URL: http://100.99.96.71:11434/v1
  API_KEY: ollama
  BRAIN_MODEL: qwen3:14b
  EDITOR_MODEL: qwen3:14b
  ENABLE_BROWSING: 'true'
